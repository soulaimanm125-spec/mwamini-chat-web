<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mwamini Chat - Workspace</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="user-profile">
                    <div class="avatar border-gold" id="userAvatar">U</div>
                    <span class="username" id="displayUsername">Loading...</span>
                </div>
                <button class="logout-btn" id="logoutBtn" title="Sign Out">✕</button>
            </div>

            <div class="status-tray-container">
                <p class="section-title">Status Updates</p>
                <div class="status-tray">
                    <div class="status-item create-status" id="addStatusBtn">
                        <div class="status-circle plus-icon">+</div>
                        <span>My Status</span>
                    </div>
                </div>
            </div>

            <div class="search-bar">
                <span class="search-icon">🔍</span>
                <input type="text" placeholder="Search team members...">
            </div>

            <div class="chat-list" id="chatList">
                </div>
        </aside>

        <main class="chat-area">
            <div class="chat-header">
                <div class="active-chat-info">
                    <div class="avatar gold-bg">G</div>
                    <div>
                        <h3>Global Workspace Chat</h3>
                        <p class="status-indicator"><span class="pulse-dot"></span> Secure Cloud Environment</p>
                    </div>
                </div>
            </div>

            <div class="messages-window" id="messagesWindow">
                </div>

            <div class="preview-drawer" id="previewDrawer" style="display: none;">
                <div class="preview-content">
                    <span id="previewFileName">filename.jpg</span>
                    <button type="button" id="cancelPreviewBtn">✕</button>
                </div>
            </div>

            <form class="input-area" id="chatInputForm">
                <label class="attachment-btn" for="fileAttachment">
                    📎
                    <input type="file" id="fileAttachment" style="display: none;">
                </label>
                
                <input type="text" id="messageInput" placeholder="Type a message..." autocomplete="off">
                <button type="submit" class="send-btn">➔</button>
            </form>
        </main>
    </div>

    <div class="modal" id="statusModal" style="display: none;">
        <div class="modal-content">
            <h3>Update Workspace Status</h3>
            <p>Share what you are working on with other team users.</p>
            <input type="text" id="statusTextInput" placeholder="What's your current status?..." maxlength="60">
            <div class="modal-actions">
                <button type="button" class="btn-cancel" id="closeStatusModal">Cancel</button>
                <button type="button" class="btn-primary-small" id="submitStatusBtn">Update</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script src="app.js"></script>
</body>
</html>
