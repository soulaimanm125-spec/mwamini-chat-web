<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mwamini Chat Web - Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar (Left side) -->
        <aside class="sidebar">
            <header class="sidebar-header">
                <div class="user-profile">
                    <span id="current-user-name">Loading...</span>
                </div>
                <div class="header-actions">
                    <button id="create-group-btn" title="Create Group">➕ Group</button>
                    <button id="logout-btn">Logout</button>
                </div>
            </header>

            <div class="search-bar">
                <input type="text" placeholder="Search or start new chat">
            </div>

            <!-- Users and Groups Lists -->
            <div class="chats-list" id="chats-sidebar-list">
                <!-- Dynamically populated via JS -->
            </div>
        </aside>

        <!-- Chat Window (Right side) -->
        <main class="chat-window">
            <!-- Default placeholder screen -->
            <div id="no-chat-selected" class="no-chat">
                <h2>Welcome to Mwamini Chat Web</h2>
                <p>Select a user or a group from the left to start encrypted, secure messaging.</p>
            </div>

            <!-- Active Chat screen -->
            <div id="active-chat-container" style="display: none;">
                <header class="chat-header">
                    <div class="active-user-info">
                        <h3 id="active-chat-title">Chat Target</h3>
                        <span id="active-chat-status"></span>
                    </div>
                </header>

                <div class="messages-container" id="messages-box">
                    <!-- Messages appear here -->
                </div>

                <footer class="chat-footer">
                    <!-- File upload for photos/videos -->
                    <label for="media-input" class="attach-btn" title="Send Photo/Video">📎</label>
                    <input type="file" id="media-input" accept="image/*,video/*" style="display:none;">
                    
                    <input type="text" id="message-input" placeholder="Type a message">
                    <button id="send-btn">Send</button>
                </footer>
            </div>
        </main>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>
    <script src="app.js"></script>
</body>
</html>
