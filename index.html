<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MWAMINI CHAT WEB - Secure Access</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">
    <div class="glass-container auth-card">
        <div class="auth-header">
            <div class="logo-badge">M</div>
            <h1>MWAMINI CHAT WEB</h1>
            <p class="subtitle">PREMIUM COMMUNICATION NODE</p>
        </div>
        
        <form id="loginForm" class="auth-form" action="dashboard.html">
            <div class="input-group">
                <span class="icon">✉</span>
                <input type="email" placeholder="System Cloud Email" required>
            </div>
            <div class="input-group">
                <span class="icon">🔒</span>
                <input type="password" placeholder="Account Token Key" required>
            </div>
            
            <button type="submit" class="btn-primary">Access Communication Core</button>
        </form>

        <div class="divider"><span>OR DATA FEDERATION</span></div>

        <button class="btn-secondary" onclick="window.location.href='dashboard.html'">
            <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google logo" class="google-icon">
            Federate Identity via Google
        </button>

        <p class="auth-footer">New operator deployment? <a href="#">Request Access Signature</a></p>
    </div>
</body>
</html>
