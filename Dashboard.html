<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mwamini Chat Web - Premium Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <header class="brand-header">
                <div class="logo-wrapper">
                    <div class="app-logo">M</div>
                    <h2>MWAMINI CHAT WEB</h2>
                </div>
                <div class="current-user-status-card">
                    <span id="current-user-name">Guest Mode Running...</span>
                    <span id="current-user-status-msg">Sign in to change profile features.</span>
                </div>
                <div class="profile-action-row">
                    <button id="update-status-btn" class="gold-btn-outline">✏️ Edit Status Bio</button>
                    <button id="logout-btn" class="danger-btn-link">Logout / Exit</button>
                </div>
            </header>

            <div class="sidebar-toolbar">
                <button id="create-group-btn" class="tool-btn theme-primary">➕ Create Group</button>
            </div>

            <div class="search-bar-container">
                <div class="search-input-wrapper">
                    <input type="text" id="search-email-input" placeholder="Find anyone by exact email...">
                    <span class="search-icon">
                        <svg viewBox="0 0 24 24" width="18" height="18"><path fill="#8696a0" d="M15.004 13.914l5.3 5.3-1.09 1.09-5.3-5.3a7.5 7.5 0 1 1 1.09-1.09zm-5.004.086a6 6 0 1 0 0-12 6 6 0 0 0 0 12z"/></svg>
                    </span>
                </div>
                <button id="add-user-btn" class="search-action-btn">Add</button>
            </div>

            <div class="chats-list" id="chats-sidebar-list">
                </div>
        </aside>

        <main class="chat-window">
            <div id="no-chat-selected" class="no-chat-state">
                <div class="branding-splash">
                    <div class="splash-logo">M</div>
                    <h2>Welcome to Mwamini Chat Web</h2>
                    <p>Search any profile using their email address above to open up instant messaging pipelines instantly.</p>
                </div>
            </div>

            <div id="active-chat-container" class="active-chat-panel" style="display: none;">
                <header class="chat-header">
                    <div class="active-user-info">
                        <h3 id="active-chat-title">Chat Target Workspace</h3>
                        <span id="active-chat-status"></span>
                    </div>
                    <div class="chat-header-actions">
                        <button id="delete-group-btn" class="delete-chat-room-btn" style="display: none;">🗑️ Delete Group</button>
                    </div>
                </header>

                <div class="messages-container" id="messages-box">
                    </div>

                <footer class="chat-footer">
                    <label for="media-input" class="attach-btn" title="Send Attachment">📎</label>
                    <input type="file" id="media-input" accept="image/*,video/*" style="display: none;">
                    
                    <input type="text" id="message-input" placeholder="Type a message here...">
                    <button id="send-btn">Send</button>
                </footer>
            </div>
        </main>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>
    <script src="app.js"></script>
</body>
</html>
